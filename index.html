<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austin Lüften</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <script src="app.js" defer></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #f4f7f6; color: #333; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-good { border-left: 10px solid #27ae60; }
        .status-bad { border-left: 10px solid #e74c3c; }
        h1 { color: #2c3e50; }
        .time-slot { font-weight: bold; font-size: 1.2em; color: #2980b9; }
        .aqi-indicator {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
    background-color: #ccc; /* Default gray */
}
/* AQI Colors based on OpenWeather standard */
.aqi-1 { background-color: #00e400; } /* Good */
.aqi-2 { background-color: #ffff00; } /* Fair */
.aqi-3 { background-color: #ff7e00; } /* Moderate */
.aqi-4 { background-color: #ff0000; } /* Poor */
.aqi-5 { background-color: #8f3f97; } /* Very Poor */
    </style>
</head>
<body>
    <h1>Austin Lüften 🪟</h1>
    
    <div id="current-weather" class="card">Detecting local air...</div>

    <div class="forecast-section">
    <h3>Today</h3>
    <div class="aqi-subheading">
        <span id="aqi-dot-today" class="aqi-indicator"></span>
        <span id="aqi-text">Loading Austin Air...</span>
    </div>
    <div id="today-slot" class="card"></div>
    <a href="https://www.austinpollen.com/" target="_blank" class="pollen-link">
        Detailed Austin Pollen Report →
    </a>
</div>

    <div class="forecast-section">
        <h3>Tomorrow</h3>
        <div id="tomorrow-slot" class="card">Checking tomorrow's outlook...</div>
    </div>
    
    <p style="font-size: 0.8em; color: #666; margin-top: 20px;">
        *Logic based on Stoßlüften (shock ventilation) principles adapted for Texas humidity.
    </p>
    <div id="last-updated" class="last-updated-text">Updating...</div>
</body>
</html>
